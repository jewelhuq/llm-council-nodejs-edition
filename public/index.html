<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLM Council</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
:root {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
  line-height: 1.5;
  font-weight: 400;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; min-width: 320px; min-height: 100vh; background: #f5f5f5; }

.markdown-content { padding: 12px; }
.markdown-content p { margin: 0 0 12px 0; }
.markdown-content p:last-child { margin-bottom: 0; }
.markdown-content h1, .markdown-content h2, .markdown-content h3,
.markdown-content h4, .markdown-content h5, .markdown-content h6 { margin: 16px 0 8px 0; }
.markdown-content h1:first-child, .markdown-content h2:first-child,
.markdown-content h3:first-child, .markdown-content h4:first-child { margin-top: 0; }
.markdown-content ul, .markdown-content ol { margin: 0 0 12px 0; padding-left: 24px; }
.markdown-content li { margin: 4px 0; }
.markdown-content pre { background: #f5f5f5; padding: 12px; border-radius: 4px; overflow-x: auto; margin: 0 0 12px 0; }
.markdown-content code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
.markdown-content pre code { background: none; padding: 0; }
.markdown-content blockquote { margin: 0 0 12px 0; padding-left: 16px; border-left: 4px solid #ddd; color: #666; }

.app { display: flex; height: 100vh; width: 100vw; overflow: hidden; background: #ffffff; color: #333; }

/* Auth */
.auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #f5f5f5; }
.auth-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 32px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.auth-card h1 { font-size: 22px; margin-bottom: 4px; }
.auth-card .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
.auth-card label { display: block; font-size: 13px; font-weight: 600; color: #555; margin: 12px 0 4px; }
.auth-card input { width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; outline: none; }
.auth-card input:focus { border-color: #4a90e2; box-shadow: 0 0 0 3px rgba(74,144,226,0.1); }
.auth-card button { width: 100%; margin-top: 20px; padding: 12px; background: #4a90e2; border: 1px solid #4a90e2; border-radius: 6px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
.auth-card button:hover { background: #357abd; }
.auth-card button:disabled { opacity: 0.6; cursor: not-allowed; }
.auth-switch { margin-top: 16px; text-align: center; font-size: 13px; color: #666; }
.auth-switch a { color: #4a90e2; cursor: pointer; text-decoration: none; }
.auth-error { margin-top: 12px; color: #c0392b; font-size: 13px; min-height: 18px; }

/* Sidebar */
.sidebar { width: 260px; background: #f8f8f8; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #e0e0e0; }
.sidebar-header h1 { font-size: 18px; margin: 0 0 12px 0; color: #333; }
.new-conversation-btn { width: 100%; padding: 10px; background: #4a90e2; border: 1px solid #4a90e2; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
.new-conversation-btn:hover { background: #357abd; }
.conversation-list { flex: 1; overflow-y: auto; padding: 8px; }
.no-conversations { padding: 16px; text-align: center; color: #999; font-size: 14px; }
.conversation-item { padding: 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; position: relative; }
.conversation-item:hover { background: #f0f0f0; }
.conversation-item.active { background: #e8f0fe; border: 1px solid #4a90e2; }
.conversation-title { color: #333; font-size: 14px; margin-bottom: 4px; padding-right: 24px; }
.conversation-meta { color: #999; font-size: 12px; }
.conversation-delete {
  position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; line-height: 18px;
  border: none; border-radius: 4px; background: transparent; color: #999; font-size: 14px;
  cursor: pointer; display: none; text-align: center; padding: 0;
}
.conversation-item:hover .conversation-delete { display: block; }
.conversation-delete:hover { background: #fdecea; color: #c0392b; }
.sidebar-footer { border-top: 1px solid #e0e0e0; padding: 12px 16px; font-size: 13px; }
.sidebar-footer .email { color: #555; margin-bottom: 8px; word-break: break-all; }
.sidebar-footer .links { display: flex; gap: 12px; }
.sidebar-footer a { color: #4a90e2; cursor: pointer; text-decoration: none; }

/* Chat */
.chat-interface { flex: 1; display: flex; flex-direction: column; height: 100vh; background: #ffffff; }
.messages-container { flex: 1; overflow-y: auto; padding: 24px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #666; text-align: center; }
.empty-state h2 { margin: 0 0 8px 0; font-size: 24px; color: #333; }
.empty-state p { margin: 0; font-size: 16px; }
.message-group { margin-bottom: 32px; }
.user-message, .assistant-message { margin-bottom: 16px; }
.message-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.user-message .message-content { background: #f0f7ff; padding: 16px; border-radius: 8px; border: 1px solid #d0e7ff; color: #333; line-height: 1.6; max-width: 80%; white-space: pre-wrap; }
.loading-indicator { display: flex; align-items: center; gap: 12px; padding: 16px; color: #666; font-size: 14px; }
.stage-loading { display: flex; align-items: center; gap: 12px; padding: 16px; margin: 12px 0; background: #f9fafb; border-radius: 8px; border: 1px solid #e0e0e0; color: #666; font-size: 14px; font-style: italic; }
.spinner { width: 20px; height: 20px; border: 2px solid #e0e0e0; border-top-color: #4a90e2; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.input-form { display: flex; align-items: flex-end; gap: 12px; padding: 24px; border-top: 1px solid #e0e0e0; background: #fafafa; }
.message-input { flex: 1; padding: 14px; background: #ffffff; border: 1px solid #d0d0d0; border-radius: 8px; color: #333; font-size: 15px; font-family: inherit; line-height: 1.5; outline: none; resize: vertical; min-height: 80px; max-height: 300px; }
.message-input:focus { border-color: #4a90e2; box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1); }
.message-input:disabled { opacity: 0.5; cursor: not-allowed; background: #f5f5f5; }
.send-button { padding: 14px 28px; background: #4a90e2; border: 1px solid #4a90e2; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; align-self: flex-end; }
.send-button:hover:not(:disabled) { background: #357abd; }
.send-button:disabled { opacity: 0.5; cursor: not-allowed; background: #ccc; border-color: #ccc; }

/* Stages */
.stage { margin: 24px 0; padding: 20px; background: #fafafa; border-radius: 8px; border: 1px solid #e0e0e0; }
.stage-title { margin: 0 0 16px 0; color: #333; font-size: 16px; font-weight: 600; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 16px; background: #ffffff; border: 1px solid #d0d0d0; border-radius: 6px 6px 0 0; color: #666; cursor: pointer; font-size: 14px; }
.tab:hover { background: #f0f0f0; color: #333; border-color: #4a90e2; }
.tab.active { background: #ffffff; color: #4a90e2; border-color: #4a90e2; border-bottom-color: #ffffff; font-weight: 600; }
.tab-content { background: #ffffff; padding: 16px; border-radius: 6px; border: 1px solid #e0e0e0; }
.model-name, .ranking-model { color: #888; font-size: 12px; margin-bottom: 12px; font-family: monospace; }
.response-text { color: #333; line-height: 1.6; }
.ranking-content { color: #333; line-height: 1.6; font-size: 14px; }

.stage2 h4 { margin: 20px 0 8px 0; color: #333; font-size: 14px; font-weight: 600; }
.stage2 h4:first-of-type { margin-top: 0; }
.stage-description { margin: 0 0 12px 0; color: #666; font-size: 13px; line-height: 1.5; }
.stage2 .tab-content { margin-bottom: 20px; }
.parsed-ranking { margin-top: 16px; padding-top: 16px; border-top: 2px solid #e0e0e0; }
.parsed-ranking strong { color: #2a7ae2; font-size: 13px; }
.parsed-ranking ol { margin: 8px 0 0 0; padding-left: 24px; color: #333; }
.parsed-ranking li { margin: 4px 0; font-family: monospace; font-size: 13px; }
.aggregate-rankings { background: #f0f7ff; padding: 16px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #d0e7ff; }
.aggregate-rankings h4 { margin: 0 0 12px 0; color: #2a7ae2; font-size: 15px; }
.aggregate-list { display: flex; flex-direction: column; gap: 8px; }
.aggregate-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #ffffff; border-radius: 6px; border: 1px solid #d0e7ff; }
.rank-position { color: #2a7ae2; font-weight: 700; font-size: 16px; min-width: 35px; }
.rank-model { flex: 1; color: #333; font-family: monospace; font-size: 14px; font-weight: 500; }
.rank-score { color: #666; font-size: 13px; font-family: monospace; }
.rank-count { color: #999; font-size: 12px; }

/* Cost summary */
.cost-summary { margin: 12px 0; padding: 14px 16px; background: #fffbf0; border: 1px solid #f0e2c0; border-radius: 8px; }
.cost-summary h4 { margin: 0 0 10px 0; color: #9a7b1e; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.cost-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.cost-table th { text-align: left; color: #999; font-weight: 500; font-size: 12px; padding: 2px 12px 6px 0; }
.cost-table th.num, .cost-table td.num { text-align: right; font-family: monospace; }
.cost-table td { padding: 3px 12px 3px 0; color: #333; }
.cost-table td.model { font-family: monospace; font-size: 12px; }
.cost-table tr.total-row td { border-top: 1px solid #f0e2c0; padding-top: 8px; font-weight: 700; color: #9a7b1e; }

.stage3 { background: #f0fff0; border-color: #c8e6c8; }
.final-response { background: #ffffff; padding: 20px; border-radius: 6px; border: 1px solid #c8e6c8; }
.chairman-label { color: #2d8a2d; font-size: 12px; font-family: monospace; margin-bottom: 12px; font-weight: 600; }
.final-text { color: #333; line-height: 1.7; font-size: 15px; }

/* Settings modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 10; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-width: calc(100vw - 32px); max-height: calc(100vh - 64px); overflow-y: auto; }
.modal h2 { font-size: 18px; margin-bottom: 4px; }
.modal .subtitle { color: #666; font-size: 13px; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 600; color: #555; margin: 14px 0 4px; }
.modal .hint { font-size: 12px; color: #999; margin-top: 2px; }
.modal input, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; font-family: monospace; outline: none; }
.modal input:focus, .modal textarea:focus { border-color: #4a90e2; }
.modal textarea { resize: vertical; min-height: 90px; }
.modal-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
.modal-actions .primary { padding: 10px 20px; background: #4a90e2; border: 1px solid #4a90e2; border-radius: 6px; color: #fff; font-weight: 600; cursor: pointer; }
.modal-actions .secondary { padding: 10px 20px; background: #fff; border: 1px solid #d0d0d0; border-radius: 6px; color: #555; cursor: pointer; }
.modal-error { color: #c0392b; font-size: 13px; min-height: 18px; margin-top: 10px; }
.key-status { font-size: 12px; margin-top: 4px; }
.key-status.set { color: #2d8a2d; }
.key-status.unset { color: #c0392b; }
</style>
</head>
<body>
<div id="root"></div>

<script>
'use strict';

// --- API client ---
async function apiFetch(path, options = {}) {
  const r = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  if (r.status === 401 && !path.startsWith('/api/auth/')) {
    state.user = null;
    render();
    throw new Error('Not authenticated');
  }
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    throw new Error(body.detail || `Request failed (${r.status})`);
  }
  return r.json();
}

const api = {
  me: () => apiFetch('/api/auth/me'),
  register: (email, password) => apiFetch('/api/auth/register', { method: 'POST', body: JSON.stringify({ email, password }) }),
  login: (email, password) => apiFetch('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) }),
  logout: () => apiFetch('/api/auth/logout', { method: 'POST' }),
  saveSettings: (settings) => apiFetch('/api/settings', { method: 'PUT', body: JSON.stringify(settings) }),
  listConversations: () => apiFetch('/api/conversations'),
  createConversation: () => apiFetch('/api/conversations', { method: 'POST', body: '{}' }),
  getConversation: (id) => apiFetch(`/api/conversations/${id}`),
  deleteConversation: (id) => apiFetch(`/api/conversations/${id}`, { method: 'DELETE' }),

  async sendMessageStream(id, content, onEvent) {
    const r = await fetch(`/api/conversations/${id}/message/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      throw new Error(body.detail || 'Failed to send message');
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const event = JSON.parse(line.slice(6));
            onEvent(event.type, event);
          } catch (e) {
            console.error('Failed to parse SSE event:', e);
          }
        }
      }
    }
  },
};

// --- State ---
const state = {
  user: undefined,          // undefined = unknown yet, null = logged out
  authMode: 'login',
  conversations: [],
  currentConversationId: null,
  currentConversation: null,
  isLoading: false,
  showSettings: false,
};
const activeTabs = {};

// --- Helpers ---
function escapeHtml(text) {
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function renderMarkdown(text) {
  if (window.marked && window.DOMPurify) return DOMPurify.sanitize(marked.parse(String(text)));
  return '<pre style="white-space:pre-wrap;background:none;">' + escapeHtml(text) + '</pre>';
}
function shortName(model) {
  const parts = String(model).split('/');
  return parts[1] || model;
}
function deAnonymizeText(text, labelToModel) {
  if (!labelToModel) return text;
  let result = String(text);
  for (const [label, model] of Object.entries(labelToModel)) {
    result = result.split(label).join(`**${shortName(model)}**`);
  }
  return result;
}

// --- Views ---
function authView() {
  const isLogin = state.authMode === 'login';
  return `
    <div class="auth-screen">
      <form class="auth-card" id="auth-form">
        <h1>LLM Council</h1>
        <div class="subtitle">${isLogin ? 'Sign in to your council' : 'Create your account'}</div>
        <label>Email</label>
        <input type="email" id="auth-email" autocomplete="email" required />
        <label>Password</label>
        <input type="password" id="auth-password" autocomplete="${isLogin ? 'current-password' : 'new-password'}" minlength="8" required />
        <div class="auth-error" id="auth-error"></div>
        <button type="submit">${isLogin ? 'Sign In' : 'Register'}</button>
        <div class="auth-switch">
          ${isLogin ? 'No account? <a id="auth-switch">Register</a>' : 'Have an account? <a id="auth-switch">Sign in</a>'}
        </div>
      </form>
    </div>
  `;
}

function settingsView() {
  const u = state.user;
  return `
    <div class="modal-backdrop" id="settings-backdrop">
      <div class="modal">
        <h2>Settings</h2>
        <div class="subtitle">Your own OpenRouter key pays for your own queries.</div>

        <label>OpenRouter API key</label>
        <input type="password" id="set-key" placeholder="${u.has_api_key ? 'Leave blank to keep current key' : 'sk-or-v1-...'}" />
        <div class="key-status ${u.has_api_key ? 'set' : 'unset'}">
          ${u.has_api_key ? '✓ A key is saved for this account' : '✗ No key saved yet — required before you can ask questions'}
        </div>

        <label>Council models (one per line)</label>
        <textarea id="set-models">${escapeHtml(u.council_models.join('\n'))}</textarea>
        <div class="hint">OpenRouter model ids, e.g. openai/gpt-5.1</div>

        <label>Chairman model</label>
        <input type="text" id="set-chairman" value="${escapeHtml(u.chairman_model)}" />

        <label>Title model</label>
        <input type="text" id="set-title-model" value="${escapeHtml(u.title_model)}" />
        <div class="hint">Fast, cheap model used to name conversations</div>

        <div class="modal-error" id="settings-error"></div>
        <div class="modal-actions">
          <button class="secondary" id="settings-cancel">Cancel</button>
          <button class="primary" id="settings-save">Save</button>
        </div>
      </div>
    </div>
  `;
}

function sidebarView() {
  const items = state.conversations.length === 0
    ? '<div class="no-conversations">No conversations yet</div>'
    : state.conversations.map((conv) => `
        <div class="conversation-item ${conv.id === state.currentConversationId ? 'active' : ''}" data-id="${escapeHtml(conv.id)}">
          <div class="conversation-title">${escapeHtml(conv.title || 'New Conversation')}</div>
          <div class="conversation-meta">${conv.message_count} messages</div>
          <button class="conversation-delete" data-delete-id="${escapeHtml(conv.id)}" title="Delete conversation">✕</button>
        </div>
      `).join('');

  return `
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>LLM Council</h1>
        <button class="new-conversation-btn" id="new-conversation">+ New Conversation</button>
      </div>
      <div class="conversation-list" id="conversation-list">${items}</div>
      <div class="sidebar-footer">
        <div class="email">${escapeHtml(state.user.email)}</div>
        <div class="links">
          <a id="open-settings">Settings${state.user.has_api_key ? '' : ' ⚠'}</a>
          <a id="logout">Log out</a>
        </div>
      </div>
    </div>
  `;
}

function renderTabs(items, stageKey, msgIndex, labelFn) {
  const active = activeTabs[`${msgIndex}:${stageKey}`] || 0;
  return items.map((item, i) => `
    <button class="tab ${i === active ? 'active' : ''}" data-msg="${msgIndex}" data-stage="${stageKey}" data-tab="${i}">
      ${escapeHtml(labelFn(item))}
    </button>
  `).join('');
}

function renderStage1(responses, msgIndex) {
  if (!responses || responses.length === 0) return '';
  const active = Math.min(activeTabs[`${msgIndex}:stage1`] || 0, responses.length - 1);
  const resp = responses[active];
  return `
    <div class="stage stage1">
      <h3 class="stage-title">Stage 1: Individual Responses</h3>
      <div class="tabs">${renderTabs(responses, 'stage1', msgIndex, (r) => shortName(r.model))}</div>
      <div class="tab-content">
        <div class="model-name">${escapeHtml(resp.model)}</div>
        <div class="response-text markdown-content">${renderMarkdown(resp.response)}</div>
      </div>
    </div>
  `;
}

function renderStage2(rankings, labelToModel, aggregateRankings, msgIndex) {
  if (!rankings || rankings.length === 0) return '';
  const active = Math.min(activeTabs[`${msgIndex}:stage2`] || 0, rankings.length - 1);
  const rank = rankings[active];

  let parsedHtml = '';
  if (rank.parsed_ranking && rank.parsed_ranking.length > 0) {
    parsedHtml = `
      <div class="parsed-ranking">
        <strong>Extracted Ranking:</strong>
        <ol>
          ${rank.parsed_ranking.map((label) => `
            <li>${escapeHtml(labelToModel && labelToModel[label] ? shortName(labelToModel[label]) : label)}</li>
          `).join('')}
        </ol>
      </div>
    `;
  }

  let aggregateHtml = '';
  if (aggregateRankings && aggregateRankings.length > 0) {
    aggregateHtml = `
      <div class="aggregate-rankings">
        <h4>Aggregate Rankings (Street Cred)</h4>
        <p class="stage-description">Combined results across all peer evaluations (lower score is better):</p>
        <div class="aggregate-list">
          ${aggregateRankings.map((agg, i) => `
            <div class="aggregate-item">
              <span class="rank-position">#${i + 1}</span>
              <span class="rank-model">${escapeHtml(shortName(agg.model))}</span>
              <span class="rank-score">Avg: ${Number(agg.average_rank).toFixed(2)}</span>
              <span class="rank-count">(${agg.rankings_count} votes)</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  return `
    <div class="stage stage2">
      <h3 class="stage-title">Stage 2: Peer Rankings</h3>
      <h4>Raw Evaluations</h4>
      <p class="stage-description">
        Each model evaluated all responses (anonymized as Response A, B, C, etc.) and provided rankings.
        Below, model names are shown in <strong>bold</strong> for readability, but the original evaluation used anonymous labels.
      </p>
      <div class="tabs">${renderTabs(rankings, 'stage2', msgIndex, (r) => shortName(r.model))}</div>
      <div class="tab-content">
        <div class="ranking-model">${escapeHtml(rank.model)}</div>
        <div class="ranking-content markdown-content">${renderMarkdown(deAnonymizeText(rank.ranking, labelToModel))}</div>
        ${parsedHtml}
      </div>
      ${aggregateHtml}
    </div>
  `;
}

function renderStage3(finalResponse) {
  if (!finalResponse) return '';
  return `
    <div class="stage stage3">
      <h3 class="stage-title">Stage 3: Final Council Answer</h3>
      <div class="final-response">
        <div class="chairman-label">Chairman: ${escapeHtml(shortName(finalResponse.model))}</div>
        <div class="final-text markdown-content">${renderMarkdown(finalResponse.response)}</div>
      </div>
    </div>
  `;
}

function stageLoading(text) {
  return `<div class="stage-loading"><div class="spinner"></div><span>${text}</span></div>`;
}

function fmtUsd(cost) {
  if (cost === null || cost === undefined) return '—';
  return '$' + (cost < 0.01 ? cost.toFixed(6) : cost.toFixed(4));
}

function renderCosts(costs) {
  if (!costs) return '';
  const modelRows = costs.models.map((m) => `
    <tr>
      <td class="model">${escapeHtml(shortName(m.model))}</td>
      <td class="num">${fmtUsd(m.stage1_cost)}</td>
      <td class="num">${fmtUsd(m.stage2_cost)}</td>
      <td class="num">${fmtUsd(m.total)}</td>
    </tr>
  `).join('');

  const chairmanRow = `
    <tr>
      <td class="model">${escapeHtml(shortName(costs.chairman.model))} <span style="color:#999">(chairman)</span></td>
      <td class="num">—</td><td class="num">—</td>
      <td class="num">${fmtUsd(costs.chairman.cost)}</td>
    </tr>
  `;

  const titleRow = costs.title ? `
    <tr>
      <td class="model">${escapeHtml(shortName(costs.title.model))} <span style="color:#999">(title)</span></td>
      <td class="num">—</td><td class="num">—</td>
      <td class="num">${fmtUsd(costs.title.cost)}</td>
    </tr>
  ` : '';

  return `
    <div class="cost-summary">
      <h4>Cost</h4>
      <table class="cost-table">
        <tr><th>Model</th><th class="num">Stage 1</th><th class="num">Stage 2</th><th class="num">Total</th></tr>
        ${modelRows}
        ${chairmanRow}
        ${titleRow}
        <tr class="total-row"><td>Combined</td><td></td><td></td><td class="num">${fmtUsd(costs.total)}</td></tr>
      </table>
    </div>
  `;
}

function chatView() {
  const conv = state.currentConversation;
  if (!conv) {
    return `
      <div class="chat-interface">
        <div class="empty-state">
          <h2>Welcome to LLM Council</h2>
          <p>${state.user.has_api_key ? 'Create a new conversation to get started' : 'Open Settings and add your OpenRouter API key first'}</p>
        </div>
      </div>
    `;
  }

  const messages = conv.messages;
  let messagesHtml;
  if (messages.length === 0) {
    messagesHtml = `
      <div class="empty-state">
        <h2>Start a conversation</h2>
        <p>Ask a question to consult the LLM Council</p>
      </div>
    `;
  } else {
    messagesHtml = messages.map((msg, index) => {
      if (msg.role === 'user') {
        return `
          <div class="message-group">
            <div class="user-message">
              <div class="message-label">You</div>
              <div class="message-content"><div class="markdown-content">${renderMarkdown(msg.content)}</div></div>
            </div>
          </div>
        `;
      }
      const loading = msg.loading || {};
      return `
        <div class="message-group">
          <div class="assistant-message">
            <div class="message-label">LLM Council</div>
            ${renderCosts(msg.costs)}
            ${loading.stage1 ? stageLoading('Running Stage 1: Collecting individual responses...') : ''}
            ${msg.stage1 ? renderStage1(msg.stage1, index) : ''}
            ${loading.stage2 ? stageLoading('Running Stage 2: Peer rankings...') : ''}
            ${msg.stage2 ? renderStage2(msg.stage2, msg.metadata && msg.metadata.label_to_model, msg.metadata && msg.metadata.aggregate_rankings, index) : ''}
            ${loading.stage3 ? stageLoading('Running Stage 3: Final synthesis...') : ''}
            ${msg.stage3 ? renderStage3(msg.stage3) : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  const showForm = messages.length === 0;
  return `
    <div class="chat-interface">
      <div class="messages-container" id="messages-container">
        ${messagesHtml}
        ${state.isLoading ? '<div class="loading-indicator"><div class="spinner"></div><span>Consulting the council...</span></div>' : ''}
      </div>
      ${showForm ? `
        <form class="input-form" id="input-form">
          <textarea class="message-input" id="message-input" rows="3"
            placeholder="Ask your question... (Shift+Enter for new line, Enter to send)" ${state.isLoading ? 'disabled' : ''}></textarea>
          <button type="submit" class="send-button" id="send-button" disabled>Send</button>
        </form>
      ` : ''}
    </div>
  `;
}

// --- Render + wiring ---
function render() {
  const root = document.getElementById('root');

  if (state.user === undefined) {
    root.innerHTML = '<div class="auth-screen"><div class="spinner"></div></div>';
    return;
  }

  if (state.user === null) {
    root.innerHTML = authView();
    wireAuth();
    return;
  }

  root.innerHTML = `
    <div class="app">
      ${sidebarView()}
      ${chatView()}
    </div>
    ${state.showSettings ? settingsView() : ''}
  `;
  wireApp();
}

function wireAuth() {
  document.getElementById('auth-switch').addEventListener('click', () => {
    state.authMode = state.authMode === 'login' ? 'register' : 'login';
    render();
  });
  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const errorEl = document.getElementById('auth-error');
    errorEl.textContent = '';
    try {
      state.user = state.authMode === 'login'
        ? await api.login(email, password)
        : await api.register(email, password);
      state.showSettings = !state.user.has_api_key;
      render();
      loadConversations();
    } catch (err) {
      errorEl.textContent = err.message;
    }
  });
}

function wireApp() {
  document.getElementById('new-conversation').addEventListener('click', newConversation);
  document.getElementById('logout').addEventListener('click', async () => {
    await api.logout().catch(() => {});
    Object.assign(state, { user: null, conversations: [], currentConversationId: null, currentConversation: null });
    render();
  });
  document.getElementById('open-settings').addEventListener('click', () => {
    state.showSettings = true;
    render();
  });

  document.getElementById('conversation-list').addEventListener('click', async (e) => {
    const deleteBtn = e.target.closest('.conversation-delete');
    if (deleteBtn) {
      e.stopPropagation();
      const id = deleteBtn.dataset.deleteId;
      if (!confirm('Delete this conversation?')) return;
      try {
        await api.deleteConversation(id);
        state.conversations = state.conversations.filter((c) => c.id !== id);
        if (state.currentConversationId === id) {
          state.currentConversationId = null;
          state.currentConversation = null;
        }
        render();
      } catch (err) {
        alert(err.message);
      }
      return;
    }
    const item = e.target.closest('.conversation-item');
    if (item) {
      state.currentConversationId = item.dataset.id;
      loadConversation(item.dataset.id);
    }
  });

  const chat = document.querySelector('.chat-interface');
  chat.addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (tab) {
      activeTabs[`${tab.dataset.msg}:${tab.dataset.stage}`] = Number(tab.dataset.tab);
      render();
    }
  });

  const container = document.getElementById('messages-container');
  if (container) container.scrollTop = container.scrollHeight;

  const form = document.getElementById('input-form');
  if (form) {
    const input = document.getElementById('message-input');
    const button = document.getElementById('send-button');
    input.addEventListener('input', () => { button.disabled = !input.value.trim() || state.isLoading; });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const content = input.value.trim();
      if (content && !state.isLoading) {
        input.value = '';
        sendMessage(content);
      }
    });
    input.focus();
  }

  if (state.showSettings) wireSettings();
}

function wireSettings() {
  document.getElementById('settings-cancel').addEventListener('click', () => {
    state.showSettings = false;
    render();
  });
  document.getElementById('settings-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'settings-backdrop') {
      state.showSettings = false;
      render();
    }
  });
  document.getElementById('settings-save').addEventListener('click', async () => {
    const errorEl = document.getElementById('settings-error');
    errorEl.textContent = '';
    const payload = {
      council_models: document.getElementById('set-models').value.split('\n').map((s) => s.trim()).filter(Boolean),
      chairman_model: document.getElementById('set-chairman').value.trim(),
      title_model: document.getElementById('set-title-model').value.trim(),
    };
    const key = document.getElementById('set-key').value.trim();
    if (key) payload.openrouter_api_key = key;
    try {
      state.user = await api.saveSettings(payload);
      state.showSettings = false;
      render();
    } catch (err) {
      errorEl.textContent = err.message;
    }
  });
}

// --- Actions ---
async function loadConversations() {
  try {
    state.conversations = await api.listConversations();
    render();
  } catch (e) {
    console.error('Failed to load conversations:', e);
  }
}

async function loadConversation(id) {
  try {
    state.currentConversation = await api.getConversation(id);
    render();
  } catch (e) {
    console.error('Failed to load conversation:', e);
  }
}

async function newConversation() {
  try {
    const conv = await api.createConversation();
    state.conversations = [{ id: conv.id, created_at: conv.created_at, title: conv.title, message_count: 0 }, ...state.conversations];
    state.currentConversationId = conv.id;
    state.currentConversation = conv;
    render();
  } catch (e) {
    console.error('Failed to create conversation:', e);
  }
}

function lastMessage() {
  return state.currentConversation.messages[state.currentConversation.messages.length - 1];
}

async function sendMessage(content) {
  if (!state.currentConversationId) return;

  state.isLoading = true;
  state.currentConversation.messages.push({ role: 'user', content });
  state.currentConversation.messages.push({
    role: 'assistant',
    stage1: null, stage2: null, stage3: null, metadata: null,
    loading: { stage1: false, stage2: false, stage3: false },
  });
  render();

  try {
    await api.sendMessageStream(state.currentConversationId, content, (type, event) => {
      const msg = lastMessage();
      switch (type) {
        case 'stage1_start': msg.loading.stage1 = true; break;
        case 'stage1_complete': msg.stage1 = event.data; msg.loading.stage1 = false; break;
        case 'stage2_start': msg.loading.stage2 = true; break;
        case 'stage2_complete': msg.stage2 = event.data; msg.metadata = event.metadata; msg.loading.stage2 = false; break;
        case 'stage3_start': msg.loading.stage3 = true; break;
        case 'stage3_complete': msg.stage3 = event.data; msg.loading.stage3 = false; break;
        case 'costs_complete': msg.costs = event.data; break;
        case 'title_complete': loadConversations(); break;
        case 'complete': state.isLoading = false; loadConversations(); break;
        case 'error': alert('Council error: ' + event.message); state.isLoading = false; break;
        default: console.log('Unknown event type:', type);
      }
      render();
    });
  } catch (e) {
    console.error('Failed to send message:', e);
    alert(e.message);
    state.currentConversation.messages = state.currentConversation.messages.slice(0, -2);
    state.isLoading = false;
    render();
  }
}

// --- Init ---
(async () => {
  try {
    state.user = await api.me();
    render();
    loadConversations();
  } catch {
    state.user = null;
    render();
  }
})();
</script>
</body>
</html>
